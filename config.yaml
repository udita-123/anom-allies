# ============================================================
# Project
# ============================================================
project:
  seed: 42
  device: auto

# ============================================================
# Dataset
# ============================================================
datasets:
  root: data
  resize: [128, 128]
  fps_extract: 10

# ============================================================
# Detector
# ============================================================
detector:
  model_path: yolov8n.pt
  conf_threshold: 0.35
  iou_threshold: 0.5
  device: auto

# ============================================================
# Tracker
# ============================================================
tracker:
  max_age: 30
  min_hits: 3
  iou_threshold: 0.3
  min_trajectory_length: 12

# ============================================================
# Feature Extraction
# ============================================================
features:
  window_size: 12
  stride: 6
  direction_bins: 8
  confinement_grid: [4, 4]
  speed_smooth_k: 3

# ============================================================
# Conv Autoencoder
# ============================================================
conv_ae:
  img_size: 128
  latent_dim: 256
  batch_size: 16
  epochs: 50
  lr: 0.0003
  threshold_percentile: 95

# ============================================================
# LSTM Autoencoder
# ============================================================
lstm_ae:
  input_dim: 2          # x,y centroids directly — simple and always has data
  hidden_dim: 64
  num_layers: 2
  dropout: 0.2
  seq_len: 12           # matches min_trajectory_length
  batch_size: 64
  epochs: 25
  lr: 0.001
  threshold_percentile: 95

# ============================================================
# Lingering behaviour scoring
# ============================================================
lingering:
  speed_threshold: 2.5
  low_motion_threshold: 2.5
  confinement_threshold: 0.05
  min_duration_frames: 60
  weights:
    speed_inv: 0.4
    confinement: 0.4
    duration: 0.2

# ============================================================
# Fusion
# ============================================================
fusion:
  weights:
    visual_ae: 0.4
    lstm_ae: 0.4
    lingering: 0.2
  anomaly_threshold: 0.6

# ============================================================
# Degradation
# ============================================================
degradation:
  gaussian_noise:
    std: 25
  motion_blur:
    kernel_range: [5, 15]
  low_light:
    brightness_factor: [0.2, 0.6]
  compression:
    jpeg_quality_range: [10, 40]

# ============================================================
# Evaluation
# ============================================================
evaluation:
  conditions:
    - clean
    - motion_blur
    - gaussian_noise
    - low_light
    - compression
    - all_combined
  frame_smoothing: 5
  auc_average: macro
  save_curves: true
  output_dir: outputs